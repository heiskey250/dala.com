<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dala Threads | Luxury Member Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* --- DESIGN TOKENS --- */
        :root {
            --primary: #5a2a82;
            --secondary: #7b3fa0;
            --accent: #ffd700;
            --white: #ffffff;
            --bg-body: #fdfaff;
            --text-main: #1a1122;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-lux: 0 30px 60px -12px rgba(90, 42, 130, 0.15);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.dark-theme {
            --bg-body: #0f0a16;
            --text-main: #f3e8ff;
            --glass: rgba(30, 20, 45, 0.85);
            --white: #1e142d;
            --shadow-lux: 0 30px 60px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* --- LUXURY HEADER --- */
        header {
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(123, 63, 160, 0.1);
            position: sticky;
            top: 0; z-index: 1000;
        }

        .logo-box {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-style: italic;
        }

        .nav-menu { display: flex; gap: 35px; list-style: none; }
        .nav-menu a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: var(--transition);
        }
        .nav-menu a:hover { color: var(--secondary); transform: translateY(-2px); }

        .header-actions { display: flex; align-items: center; gap: 20px; }

        /* --- ANIMATED BEAD BACKGROUND --- */
        #bead-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* --- THE FORM CARD --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .luxury-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 440px;
            padding: 60px 45px;
            border-radius: 40px;
            box-shadow: var(--shadow-lux);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Decorative "Thread" across the card */
        .luxury-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
        }

        .luxury-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .luxury-card p.subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 40px;
        }

        /* --- PREMIUM INPUTS --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            margin-left: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--secondary);
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 42px;
            color: #ccc;
            transition: var(--transition);
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 18px;
            border: 2px solid transparent;
            background: var(--white);
            color: var(--text-main);
            font-size: 1rem;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .input-group input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 10px 20px rgba(90, 42, 130, 0.1);
        }

        .input-group input:focus + i { color: var(--primary); }

        /* --- MAGNETIC BUTTON --- */
        .btn-luxury {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(90, 42, 130, 0.3);
        }

        .btn-luxury:hover {
            background: var(--secondary);
            transform: scale(1.02);
            letter-spacing: 1px;
        }

        /* --- THEME TOGGLE --- */
        .toggle-btn {
            background: none;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            width: 38px; height: 38px;
            border-radius: 12px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: var(--transition);
        }

        .toggle-btn:hover { background: var(--primary); color: white; }

        @media (max-width: 800px) {
            .nav-menu { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="bead-canvas"></canvas>

    <header>
        <a href="#" class="logo-box">Dala Threads</a>
        
        <nav>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <select id="langSwitch" onchange="translatePage()" style="border:none; background:transparent; font-weight:600; color:var(--primary); cursor:pointer;">
                <option value="en">EN</option>
                <option value="rw">RW</option>
            </select>
            <button class="toggle-btn" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="luxury-card">
            <h2 id="greet">Welcome back</h2>
            <p class="subtitle">Enter your details to access your account</p>
            
            <form onsubmit="handleAuth(event)">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-shield-halved"></i>
                </div>

                <button type="submit" class="btn-luxury" id="btn-text">
                    SIGN IN 
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </form>

            <div style="margin-top: 30px; font-size: 0.85rem;">
                <span style="color: #888;">Don't have an account?</span> 
                <a href="#" style="color: var(--primary); font-weight: 700; text-decoration: none;">Join the Atelier</a>
            </div>
        </div>
    </main>

    <script>
        // 1. DYNAMIC BEAD BACKGROUND
        const canvas = document.getElementById('bead-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < -10) p.y = canvas.height + 10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--primary') + '22';
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        animate();

        // 2. THEME ENGINE
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('dark-theme');
            const isDark = body.classList.contains('dark-theme');
            icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // 3. TRANSLATION ENGINE
        const i18n = {
            en: { greet: "Welcome back", btn: "SIGN IN" },
            rw: { greet: "Murakaza neza", btn: "INJIRA" }
        };

        function translatePage() {
            const lang = document.getElementById('langSwitch').value;
            document.getElementById('greet').innerText = i18n[lang].greet;
            document.getElementById('btn-text').innerHTML = i18n[lang].btn + ' <i class="fa-solid fa-chevron-right"></i>';
        }

        // 4. AUTH HANDLER
        function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-text');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> VERIFYING...';
            setTimeout(() => {
                alert("Access Granted.");
                window.location.href = "index.html";
            }, 1800);
        }
    </script>
</body>
</html>
